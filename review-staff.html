<style>

.textarea-review::placeholder{color:#bbb}
.bg-gen{width:100%;padding:14px;border-radius:14px;font-size:15px;cursor:pointer;border:none;background:linear-gradient(135deg,#2d4a7a,#4a7cb5);color:#fff;font-family:inherit;font-weight:700;letter-spacing:.03em;box-shadow:0 4px 12px rgba(45,74,122,.3);transition:opacity .15s}

.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn-copy{flex:1;padding:12px;border-radius:12px;font-size:14px;cursor:pointer;border:none;background:#2d4a7a;color:#fff;font-family:inherit;font-weight:700;min-width:120px}
.btn-copy:hover{background:#1e3560}
.btn-retry{padding:12px 18px;border-radius:12px;font-size:13px;cursor:pointer;border:1.5px solid #e0e8f0;background:#fff;color:#666;font-family:inherit}
.btn-retry:hover{background:#f0f5fa}

.cok.show{opacity:1}

<body>

<div class="hero">
  <div class="staff-tag">🔒 スタッフ専用</div>
  <h1>オーナー返信ジェネレーター</h1>
  <p>クチコミ文を貼り付けるだけで返信を自動生成｜とくなが接骨院</p>
</div>

<div class="wrap">

  <div class="card">
    <div class="lb">📋 クチコミ文を貼り付け</div>
    <div class="hint">Googleマップに投稿されたレビューをコピーしてそのまま貼ってください</div>
    <textarea class="textarea-review" id="review-text" placeholder="例）腰痛でずっと悩んでいましたが、こちらに通い始めてから本当に楽になりました。先生がとても丁寧で、毎回しっかり説明してくれるので安心できます。キッズスペースもあって子連れでも通いやすいです。西宮でこんなに良い接骨院に出会えて良かったです。"></textarea>
    <div class="detected-box" id="detected-box">
      <div class="detected-title">🔍 検出されたキーワード</div>
      <div class="detected-kws" id="detected-kws"></div>
    </div>
  </div>

  <div class="card">
    <div class="sel-row">
      <div class="sel-item">
        <div class="lb" style="font-size:13px;margin-bottom:6px">絵文字</div>
        <select class="sl" id="emolv">
          <option value="2">あり</option>
          <option value="1">少しだけ</option>
          <option value="0">なし</option>
        </select>
      </div>
    </div>
  </div>

  <button class="bg-gen" id="gen-btn" onclick="genReply()">✨ 返信を生成する</button>

    <div class="out-card">
      <div class="out-label">↩️ オーナー返信文</div>
      <div class="out-text" id="rp"></div>
      <div class="meta-row">
        <span class="char-cnt" id="pcc"></span>
        <div class="kw-wrap" id="pk"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-copy" onclick="cpy()">📋 コピーする</button>
      <button class="btn-retry" onclick="genReply()">🔄 別パターン</button>
    </div>

  </div>

</div>

<script>

function S(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function emoLv(){return+document.getElementById('emolv').value}
function e(pool){if(emoLv()===0)return'';return P(pool)}

// キーワード定義：クチコミ文から検出するキーワードとそのカテゴリ
const KW_MAP=[

  {kw:'足首',cat:'sport',label:'足首の痛み'},{kw:'捻挫',cat:'sport',label:'捻挫'},
  {kw:'スポーツ',cat:'sport',label:'スポーツ障害'},{kw:'骨盤矯正',cat:'align',label:'骨盤矯正'},
  {kw:'骨盤',cat:'align',label:'骨盤ケア'},{kw:'産後',cat:'postpartum',label:'産後ケア'},
  {kw:'出産',cat:'postpartum',label:'産後ケア'},{kw:'姿勢',cat:'align',label:'姿勢改善'},
  {kw:'猫背',cat:'align',label:'猫背矯正'},{kw:'交通事故',cat:'accident',label:'交通事故'},
  {kw:'むちうち',cat:'accident',label:'むちうち'},{kw:'頭痛',cat:'upper',label:'頭痛'},
  {kw:'五十肩',cat:'upper',label:'五十肩'},{kw:'四十肩',cat:'upper',label:'四十肩'},
  {kw:'背中',cat:'upper',label:'背中の痛み'},{kw:'腱鞘炎',cat:'other',label:'腱鞘炎'},
  {kw:'しびれ',cat:'other',label:'しびれ'},{kw:'O脚',cat:'align',label:'O脚矯正'},
  {kw:'冷え',cat:'other',label:'冷え性'},{kw:'むくみ',cat:'other',label:'むくみ'},
  {kw:'顎',cat:'other',label:'顎関節症'},{kw:'パーソナル',cat:'training',label:'パーソナルトレーニング'},
  // 良かった点系
  {kw:'丁寧',cat:'good',label:'丁寧な施術'},{kw:'優しい',cat:'good',label:'優しい対応'},
  {kw:'説明',cat:'good',label:'わかりやすい説明'},{kw:'改善',cat:'result',label:'症状改善'},
  {kw:'楽に',cat:'result',label:'楽になった'},{kw:'歩け',cat:'result',label:'歩行改善'},
  {kw:'出かけ',cat:'result',label:'外出できた'},{kw:'使い方',cat:'result',label:'身体の使い方'},
  {kw:'キッズ',cat:'kids',label:'キッズスペース'},{kw:'子ども',cat:'kids',label:'子ども連れOK'},
  {kw:'子供',cat:'kids',label:'子ども連れOK'},{kw:'受付',cat:'kids',label:'受付スタッフ'},
  {kw:'保険',cat:'cost',label:'保険適用'},{kw:'通いやすい',cat:'access',label:'通いやすい'},
  {kw:'予約',cat:'access',label:'予約しやすい'},{kw:'清潔',cat:'env',label:'清潔な院内'},
  {kw:'根本',cat:'result',label:'根本改善'},{kw:'再発',cat:'result',label:'再発防止'},
  {kw:'アドバイス',cat:'good',label:'アドバイス'},{kw:'ストレッチ',cat:'good',label:'ストレッチ指導'},
  // 地域系
  {kw:'西宮',cat:'area',label:'西宮エリア'},{kw:'鳴尾',cat:'area',label:'鳴尾エリア'},
  {kw:'甲子園',cat:'area',label:'甲子園エリア'},
  // E-E-A-T系（実体験・具体性・通院期間）
  {kw:'ヶ月',cat:'eeat',label:'通院期間あり'},{kw:'ヶ月間',cat:'eeat',label:'通院期間あり'},
  {kw:'回通',cat:'eeat',label:'通院回数あり'},{kw:'回ほど',cat:'eeat',label:'通院回数あり'},
  {kw:'週間',cat:'eeat',label:'通院期間あり'},{kw:'年以上',cat:'eeat',label:'長期通院'},
  {kw:'実際に',cat:'eeat',label:'実体験'},{kw:'体験',cat:'eeat',label:'実体験'},
  {kw:'効果を実感',cat:'eeat',label:'効果実感'},{kw:'変化を感じ',cat:'eeat',label:'効果実感'},
  {kw:'通い始め',cat:'eeat',label:'継続通院'},{kw:'定期的',cat:'eeat',label:'定期通院'},
  {kw:'先生に診て',cat:'eeat',label:'専門診察'},{kw:'柔道整復',cat:'eeat',label:'専門資格'},
  {kw:'初めて',cat:'eeat',label:'初来院体験'},{kw:'初回',cat:'eeat',label:'初回体験'}
];

// カテゴリ別の返信テンプレート
const RTH={
  upper:['肩や首のお悩みでご来院いただきありがとうございます','お体のつらさの中ご来院いただきありがとうございます','肩・首のケアでお越しくださりありがとうございます'],
  lower:['腰・股関節のお悩みでご来院いただきありがとうございます','お体の不調の中ご来院くださりありがとうございます','腰のお悩みでお越しくださりありがとうございます'],
  knee:['膝のお悩みでご来院いただきありがとうございます','お膝のつらさの中通ってくださりありがとうございます','膝の痛みでお越しくださりありがとうございます'],
  align:['体の歪みのご相談でご来院いただきありがとうございます','矯正にお越しいただきありがとうございます','骨盤ケアでご来院いただきありがとうございます'],
  postpartum:['産後のお体のケアでご来院いただきありがとうございます','お忙しい育児の中通ってくださりありがとうございます','産後ケアでお越しくださりありがとうございます'],
  accident:['お体がおつらい中ご来院いただきありがとうございます','事故後の不調でお越しくださりありがとうございます','交通事故後のケアでご来院いただきありがとうございます'],
  sport:['スポーツでのお悩みでご来院いただきありがとうございます','体を大切にされている中お越しくださりありがとうございます','スポーツ障害のケアでご来院いただきありがとうございます'],
  training:['パーソナルトレーニングにお越しいただきありがとうございます','体づくりにご来院いただきありがとうございます'],
  other:['ご来院いただきありがとうございます','嬉しいクチコミをいただきありがとうございます','温かいお言葉をいただきありがとうございます']
};
const RMD={
  upper:['肩や首まわりは姿勢や疲れの影響を受けやすい部分ですので、継続的なケアで根本から改善していきましょう。','デスクワークや日常の負担で硬くなりやすい部分ですが、引き続きしっかりサポートさせていただきます。'],
  lower:['腰・股関節は体の要ですので、日常生活を快適にお過ごしいただけるよう引き続きサポートいたします。','腰の不調は生活全体に影響しますので、しっかり改善に向けて一緒に取り組んでまいります。'],
  knee:['膝の痛みは日常の動作に大きく関わりますので、歩くことが楽しくなるようしっかりサポートいたします。','膝のお悩みに対して、お一人おひとりに合わせた施術プランでケアしてまいります。'],
  align:['体のバランスが整うと、さまざまな不調の改善につながります。引き続き良い状態を目指しましょう。','矯正の効果を感じていただけて嬉しいです。さらに良い状態を維持できるようサポートいたします。'],
  postpartum:['産後のお体は大きな変化を経ていますので、無理のないペースでしっかりケアしていきましょう。','育児中のお体のケアはとても大切です。お子さま連れでも安心してお越しください。'],
  accident:['事故後のお体は見えないところにもダメージが残りやすいので、しっかり回復するまでサポートいたします。','焦らずじっくり、しっかり回復していきましょう。いつでもご相談ください。'],
  sport:['スポーツを楽しみながら体をケアすることが大切です。怪我の予防も含めてサポートいたします。','体のコンディショニングとパフォーマンス向上のお手伝いをさせていただきます。'],
  training:['体の正しい使い方を身につけることで、日常の動きが大きく変わります。引き続きサポートいたします。','パーソナルトレーニングを通じて、ご自身の体の可能性を一緒に広げていきましょう。'],
  other:['お体の不調が少しでも楽になっているようで何よりです。引き続きサポートいたします。','日々のお体のケアに少しでもお役に立てていれば幸いです。']
};

// 属性別の補強キーワード候補
const ATTR_KW={
  kids:['キッズスペース完備','お子さま連れ歓迎','産後の骨盤ケア'],
  postpartum:['産後の骨盤ケア','骨盤矯正','キッズスペース完備','姿勢改善'],
  cost:['保険適用','各種保険対応','リーズナブルな施術'],
  result:['根本からの改善','再発防止ケア','体のメンテナンス'],
  training:['パーソナルトレーニング','体の使い方指導','体幹トレーニング','歩行改善サポート']
};

// 症状カテゴリ別の補強キーワード
const CAT_KW={
  upper:['姿勢改善','骨盤矯正','頭痛ケア','肩こり・首こりの施術'],
  lower:['骨盤矯正','坐骨神経痛の施術','脊柱管狭窄症ケア','変形性股関節症の施術','腰痛ケア'],
  knee:['変形性膝関節症の専門施術','膝痛の専門プログラム','O脚矯正','保険適用'],
  align:['姿勢改善','骨盤矯正','O脚矯正','体のバランス調整'],
  postpartum:['産後の骨盤ケア','骨盤矯正','キッズスペース完備','姿勢改善'],
  accident:['交通事故治療','むちうちケア','保険適用','自賠責対応'],
  sport:['スポーツ障害ケア','捻挫の施術','体のメンテナンス','パフォーマンス向上サポート'],
  training:['パーソナルトレーニング','姿勢改善','体の使い方指導','体幹トレーニング'],
  other:['骨盤矯正','姿勢改善','保険適用','体のトータルケア']
};

const RCL=['お体のことでお悩みの際は、いつでもお気軽にご相談ください','今後もお一人おひとりに寄り添った施術を心がけてまいります','引き続き、地域の皆さまの健康をサポートさせていただきます','またのご来院をスタッフ一同お待ちしております'];
const EM={P:['😊','🙏','✨']};
const KS_OUT=['接骨院','骨盤矯正','肩こり','腰痛','膝','交通事故','産後','姿勢','矯正','スポーツ','頭痛','施術','保険','パーソナルトレーニング','歩行','変形性膝関節症','変形性股関節症','脊柱管狭窄症','坐骨神経痛'];
const KA_OUT=['西宮','鳴尾','甲子園'];

function tLen(t){return t.replace(/[\n\s\u200B-\u200D\uFEFF]/g,'').replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu,'').length}

// クチコミ文を解析してキーワードと主要カテゴリを返す
function analyzeReview(text){
  const found=[];
  const cats=new Set();
  KW_MAP.forEach(km=>{
    if(text.includes(km.kw)){
      found.push(km);
      cats.add(km.cat);
    }
  });
  // E-E-A-Tスコア計算（通院期間・回数・実体験語の数）
  const eeatFound=found.filter(f=>f.cat==='eeat');
  const eeatScore=eeatFound.length;
  return{found,cats:[...cats],eeatScore,eeatFound};
}

// テキストエリアの内容が変わったらリアルタイムでキーワード検出
document.getElementById('review-text').addEventListener('input',function(){
  const text=this.value;
  if(!text.trim()){document.getElementById('detected-box').style.display='none';return;}
  const {found,eeatScore,eeatFound}=analyzeReview(text);
  const box=document.getElementById('detected-box');
  const kws=document.getElementById('detected-kws');
  kws.innerHTML='';
  if(found.length===0){
    box.style.display='block';
    kws.innerHTML='<span class="no-detect">キーワードが検出されませんでした</span>';
  }else{
    box.style.display='block';
    const seen=new Set();
    // 症状・良かった点系
    found.filter(f=>f.cat!=='eeat').forEach(km=>{
      if(!seen.has(km.label)){
        seen.add(km.label);
        const s=document.createElement('span');
        s.className='kt kt-detected';
        s.textContent=km.label;
        kws.appendChild(s);
      }
    });
    // E-E-A-Tバッジ
    if(eeatScore>0){
      const badge=document.createElement('span');
      badge.className='kt';
      badge.style.background=eeatScore>=2?'#e8f4e8':'#fff3cd';
      badge.style.color=eeatScore>=2?'#1a6b1a':'#7a5a00';
      badge.textContent='E-E-A-T: '+eeatScore+'点 '+(eeatScore>=2?'✅':'⚠️');
      kws.appendChild(badge);
    }else{
      const badge=document.createElement('span');
      badge.className='kt';
      badge.style.background='#fde8e8';badge.style.color='#8b1a1a';
      badge.textContent='E-E-A-T: 低 ❌';
      kws.appendChild(badge);
    }
  }
});

let lastRp='';

// E-E-A-T対応の返信フレーズ（実体験・通院期間に言及する返信）
const EEAT_REPLY_ACK=[
  'これほど具体的なご体験をお書きいただき、大変ありがとうございます。',
  '実際の体験を詳しくお伝えいただき、誠にありがとうございます。',
  '継続してご来院いただいた成果を実感していただけて、スタッフ一同嬉しく思います。',
];
const EEAT_REPLY_LOW=[
  'ぜひ今後も通院期間や施術回数など、具体的なご体験もお聞かせいただけますと、より多くの方のご参考になります。',
  '施術を通じて感じた変化や、どのくらいの期間で改善されたかなど、体験談をお聞かせいただけると他の患者さまの励みになります。',
];

function genReply(){
  const text=document.getElementById('review-text').value.trim();
  if(!text){alert('クチコミ文を貼り付けてください');return;}

  const {found,cats,eeatScore}=analyzeReview(text);

  // 主要カテゴリを決定（症状系を優先）
  const symCats=['postpartum','accident','knee','sport','training','lower','upper','align','other'];
  let mainCat='other';
  for(const sc of symCats){if(cats.includes(sc)){mainCat=sc;break;}}

  // 返信の冒頭（E-E-A-Tスコアが高ければ実体験に言及した冒頭を使う）
  let thx=P(RTH[mainCat]||RTH.other);
  let eeatAck='';
  if(eeatScore>=2){
    eeatAck=P(EEAT_REPLY_ACK);
  }

  // 返信の中盤
  const mid=P(RMD[mainCat]||RMD.other);

  // 補強キーワード：クチコミに含まれていないものを選ぶ
  let pool=[...(CAT_KW[mainCat]||CAT_KW.other)];
  cats.forEach(c=>{if(ATTR_KW[c])pool=[...pool,...ATTR_KW[c]]});
  pool=[...new Set(pool)];
  let rpKws=S(pool).filter(k=>{
    const core=k.replace(/[・の]/g,'').replace('施術','').replace('専門','').replace('ケア','').replace('完備','').replace('サポート','');
    return!text.includes(core);
  }).slice(0,2);
  if(!rpKws.length)rpKws=S(pool).slice(0,1);

  // エリア
  const hasArea=KA_OUT.some(k=>text.includes(k));
  const an=P(['西宮・鳴尾','鳴尾エリア','西宮市鳴尾']);

  const kwL='とくなが接骨院では'+rpKws.join('や')+'にも対応しておりますので、'+(hasArea?'':''+an+'で')+'何かお困りの際はいつでもご相談ください。';

  // E-E-A-Tスコアに応じて返信構成を変える
  let rp;
  if(eeatScore>=2){
    // 実体験が豊富 → 実体験への言及を冒頭に入れる
    rp=thx+'！'+e(EM.P)+'\n'+eeatAck+'\n'+mid+'\n'+kwL+'\n'+P(RCL)+'。'+e(EM.P);
  }else{
    // 実体験が少ない → 通常返信
    rp=thx+'！'+e(EM.P)+'\n'+mid+'\n'+kwL+'\n'+P(RCL)+'。'+e(EM.P);
  }

  lastRp=rp;
  document.getElementById('out-wrap').style.display='block';
  document.getElementById('rp').textContent=rp;
  document.getElementById('pcc').textContent=tLen(rp)+'文字';
  document.getElementById('cok').classList.remove('show');

  // 返信内のキーワードをタグ表示
  const el=document.getElementById('pk');el.innerHTML='';
  const f=new Set();
  KS_OUT.forEach(k=>{if(rp.includes(k))f.add(k)});
  KA_OUT.forEach(k=>{if(rp.includes(k))f.add(k)});
  f.forEach(k=>{const s=document.createElement('span');s.className='kt';s.textContent=k;el.appendChild(s)});

  document.getElementById('out-wrap').scrollIntoView({behavior:'smooth',block:'start'});
}

async function cpy(){
  try{await navigator.clipboard.writeText(lastRp)}catch(err){
    const ta=document.createElement('textarea');ta.value=lastRp;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  }
  const o=document.getElementById('cok');o.classList.add('show');setTimeout(()=>o.classList.remove('show'),2000);
}
</script>
